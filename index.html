<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My AI App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>My AI App</h1>
        <p class="subtitle">Ask anything — get an AI-powered answer.</p>
      </header>

      <main>
        <div class="input-area">
          <textarea
            id="question-input"
            placeholder="Type your question here..."
            rows="3"
          ></textarea>
          <button id="ask-button">Ask AI</button>
        </div>

        <div id="answer-area" class="answer-area">
          <p class="placeholder-text">Your answer will appear here.</p>
        </div>
      </main>

      <footer>
        <p>Powered by AI</p>
      </footer>
    </div>

    <script src="app.js"></script>
  </body>
</html>
