<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Q&A</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Ask Anything</h1>
    <p class="subtitle">Type a question and get an AI-powered answer.</p>

    <div class="input-area">
      <textarea
        id="question-input"
        placeholder="e.g. What is the speed of light?"
        rows="3"
      ></textarea>
      <button id="ask-button">Ask AI</button>
    </div>

    <div id="answer-area" class="answer-area">
      <!-- AI response appears here -->
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
